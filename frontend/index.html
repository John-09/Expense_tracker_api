<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Expense Tracker</title>

    <link rel="stylesheet" href="/styles.css" />
  </head>

  <body>
    <main class="container">
      <h1>Expense Tracker</h1>

      <section class="section">
        <h2>Add Expense</h2>

        <form id="expense-form">
          <div class="form-grid">
            <div class="form-group">
              <label for="title"> Title </label>

              <input id="title" name="title" type="text" required />
            </div>

            <div class="form-group">
              <label for="amount"> Amount </label>

              <input
                id="amount"
                name="amount"
                type="number"
                min="0.01"
                step="0.01"
                required
              />
            </div>

            <div class="form-group">
              <label for="date"> Date </label>

              <input id="date" name="date" type="date" required />
            </div>

            <div class="form-group">
              <label for="category"> Category </label>

              <select id="category" name="category" required>
                <option value="">Loading categories...</option>
              </select>
            </div>

            <div class="form-group full-width">
              <label for="description"> Description </label>

              <textarea id="description" name="description"></textarea>
            </div>

            <div class="form-group full-width">
              <button id="submit-button" type="submit">Add Expense</button>
            </div>
          </div>

          <div id="form-message" class="message"></div>
        </form>
      </section>

      <section class="section">
        <h2>Expenses</h2>

        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Title</th>
                <th>Amount</th>
                <th>Category</th>
                <th>Date</th>
                <th>Description</th>
              </tr>
            </thead>

            <tbody id="expense-table-body">
              <tr>
                <td colspan="5">Loading expenses...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

      <section class="section">
        <h2>Monthly Summary</h2>

        <div class="summary-controls">
          <div class="form-group">
            <label for="summary-month"> Month </label>

            <input id="summary-month" type="month" />
          </div>

          <button id="load-summary-button" type="button">Load Summary</button>
        </div>

        <div id="summary-total" class="summary-total"></div>

        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Category</th>
                <th>Total</th>
                <th>Percentage</th>
              </tr>
            </thead>

            <tbody id="summary-table-body">
              <tr>
                <td colspan="3">Select a month to load the summary.</td>
              </tr>
            </tbody>
          </table>
        </div>

        <div id="summary-message" class="message"></div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
